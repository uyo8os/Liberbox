name: Build
on:
  push:
    tags:
      - v*
    paths-ignore:
      - "README.md"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_dispatch:

permissions: write-all

env:
  # 强制使用 Node.js 24 以避免弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x64
          # - ia32
          # - arm64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: |
            native/helper/go.sum

      - name: Ensure tools directory
        run: New-Item -ItemType Directory -Force -Path tools | Out-Null
        shell: pwsh

      - name: Build SysProxy
        run: |
          cd native/sysproxy
          go mod tidy
          $env:GOOS = "windows"
          $env:CGO_ENABLED = "0"
          if ("${{ matrix.arch }}" -eq "x64") {
            $env:GOARCH = "amd64"
          } elseif ("${{ matrix.arch }}" -eq "ia32") {
            $env:GOARCH = "386"
          } elseif ("${{ matrix.arch }}" -eq "arm64") {
            $env:GOARCH = "arm64"
          }
          go build -ldflags="-s -w" -o ../../tools/sysproxy.exe .
        shell: pwsh

      - name: Build Helper Service
        run: |
          cd native/helper
          go mod tidy
          $env:GOOS = "windows"
          $env:CGO_ENABLED = "0"
          if ("${{ matrix.arch }}" -eq "x64") {
            $env:GOARCH = "amd64"
          } elseif ("${{ matrix.arch }}" -eq "ia32") {
            $env:GOARCH = "386"
          } elseif ("${{ matrix.arch }}" -eq "arm64") {
            $env:GOARCH = "arm64"
          }
          go build -ldflags="-s -w" -o ../../tools/liberbox-helper.exe .
        shell: pwsh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
        run: npm install

      - name: Prepare (Download Mihomo Core)
        run: node scripts/prepare.mjs --${{ matrix.arch }}

      - name: Build Next.js
        run: npm run build

      - name: Build Electron
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
        run: npm run electron:build:ci

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Windows-${{ matrix.arch }}
          path: |
            dist/*-setup.exe
            dist/*.7z
          if-no-files-found: error
          retention-days: 7

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*-setup.exe
            dist/*.7z
          body: |
            # 🎉 Liberbox ${{ github.ref_name }}
            
            ## 📦 Download link:
            
            ### Windows 10/11:
            
            [![64-bit EXE](https://img.shields.io/badge/64--bit-EXE-0078D4?style=for-the-badge&logo=windows&logoColor=white)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Liberbox-${{ github.ref_name }}-x64-setup.exe)
            [![64-bit 7Z](https://img.shields.io/badge/64--bit-7Z-0078D4?style=for-the-badge&logo=7zip&logoColor=white)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Liberbox-${{ github.ref_name }}-x64.7z)
            
            ### macOS 11+:
            
            [![Intel DMG](https://img.shields.io/badge/Intel-DMG-000000?style=for-the-badge&logo=apple&logoColor=white)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Liberbox-${{ github.ref_name }}-x64.dmg)
            [![Apple Silicon DMG](https://img.shields.io/badge/Apple_Silicon-DMG-000000?style=for-the-badge&logo=apple&logoColor=white)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Liberbox-${{ github.ref_name }}-arm64.dmg)
            
            ---
            
            ## 🔧 Installation
            
            ### Windows
            1. Download the `.exe` installer
            2. Run the installer and follow the setup wizard
            3. Launch Liberbox from the Start Menu
            
            ### macOS
            1. Download the `.dmg` file for your architecture
            2. Open the DMG and drag Liberbox to Applications
            3. Launch Liberbox from Applications folder
            
            ---
            
            **Full Changelog**: https://github.com/${{ github.repository }}/compare/v0.0.0...${{ github.ref_name }}
          fail_on_unmatched_files: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Dev Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          files: |
            dist/*-setup.exe
            dist/*.7z
          fail_on_unmatched_files: false
          prerelease: true
          draft: false
          token: ${{ secrets.GITHUB_TOKEN }}

  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
        run: npm install

      - name: Prepare (Download Mihomo Core)
        run: node scripts/prepare.mjs --${{ matrix.arch }}

      - name: Build Next.js
        run: npm run build

      - name: Build Electron
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
        run: npm run electron:build:ci

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MacOS-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
          retention-days: 7

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
          body: |
            # 🎉 Liberbox ${{ github.ref_name }}
            
            ## 📦 Download link:
            
            ### Windows 10/11:
            
            [![64-bit EXE](https://img.shields.io/badge/64--bit-EXE-0078D4?style=for-the-badge&logo=windows&logoColor=white)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Liberbox-${{ github.ref_name }}-x64-setup.exe)
            [![64-bit 7Z](https://img.shields.io/badge/64--bit-7Z-0078D4?style=for-the-badge&logo=7zip&logoColor=white)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Liberbox-${{ github.ref_name }}-x64.7z)
            
            ### macOS 11+:
            
            [![Intel DMG](https://img.shields.io/badge/Intel-DMG-000000?style=for-the-badge&logo=apple&logoColor=white)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Liberbox-${{ github.ref_name }}-x64.dmg)
            [![Apple Silicon DMG](https://img.shields.io/badge/Apple_Silicon-DMG-000000?style=for-the-badge&logo=apple&logoColor=white)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Liberbox-${{ github.ref_name }}-arm64.dmg)
            
            ---
            
            ## 🔧 Installation
            
            ### Windows
            1. Download the `.exe` installer
            2. Run the installer and follow the setup wizard
            3. Launch Liberbox from the Start Menu
            
            ### macOS
            1. Download the `.dmg` file for your architecture
            2. Open the DMG and drag Liberbox to Applications
            3. Launch Liberbox from Applications folder
            
            ---
            
            **Full Changelog**: https://github.com/${{ github.repository }}/compare/v0.0.0...${{ github.ref_name }}
          fail_on_unmatched_files: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Dev Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          files: |
            dist/*.dmg
            dist/*.zip
          fail_on_unmatched_files: false
          prerelease: true
          draft: false
          token: ${{ secrets.GITHUB_TOKEN }}
