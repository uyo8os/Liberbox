name: Build
on:
  push:
    tags:
      - v*
    paths-ignore:
      - 'README.md'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions: write-all

jobs:
  windows:
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x64
          # - ia32
          # - arm64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Dependencies
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
        run: npm install
      
      - name: Prepare (Download Mihomo Core)
        run: node scripts/prepare.mjs --${{ matrix.arch }}
      
      - name: Build Next.js
        run: npm run build
      
      - name: Build Electron (Setup)
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
        run: npm run electron:build
      
      - name: Create Portable Version
        run: |
          New-Item -Path "PORTABLE" -ItemType File
          Get-ChildItem dist/*.7z | ForEach-Object {
            7z a $_.FullName PORTABLE
          }
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Windows-${{ matrix.arch }}
          path: |
            dist/*.exe
            dist/*.7z
          if-no-files-found: error
      
      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.7z
          token: ${{ secrets.GITHUB_TOKEN }}

