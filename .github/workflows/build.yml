name: Build
on:
  push:
    tags:
      - v*
    paths-ignore:
      - "README.md"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_dispatch:

permissions: write-all

jobs:
  windows:
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x64
          # - ia32
          # - arm64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: |
            native/helper/go.sum

      - name: Ensure tools directory
        run: New-Item -ItemType Directory -Force -Path tools | Out-Null
        shell: pwsh

      - name: Build SysProxy
        run: |
          cd native/sysproxy
          go mod tidy
          $env:GOOS = "windows"
          $env:CGO_ENABLED = "0"
          if ("${{ matrix.arch }}" -eq "x64") {
            $env:GOARCH = "amd64"
          } elseif ("${{ matrix.arch }}" -eq "ia32") {
            $env:GOARCH = "386"
          } elseif ("${{ matrix.arch }}" -eq "arm64") {
            $env:GOARCH = "arm64"
          }
          go build -ldflags="-s -w" -o ../../tools/sysproxy.exe .
        shell: pwsh

      - name: Build Helper Service
        run: |
          cd native/helper
          go mod tidy
          $env:GOOS = "windows"
          $env:CGO_ENABLED = "0"
          if ("${{ matrix.arch }}" -eq "x64") {
            $env:GOARCH = "amd64"
          } elseif ("${{ matrix.arch }}" -eq "ia32") {
            $env:GOARCH = "386"
          } elseif ("${{ matrix.arch }}" -eq "arm64") {
            $env:GOARCH = "arm64"
          }
          go build -ldflags="-s -w" -o ../../tools/liberbox-helper.exe .
        shell: pwsh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
        run: npm install

      - name: Prepare (Download Mihomo Core)
        run: node scripts/prepare.mjs --${{ matrix.arch }}

      - name: Build Next.js
        run: npm run build

      - name: Build Electron
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
        run: npm run electron:build:ci

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Windows-${{ matrix.arch }}
          path: |
            dist/*-setup.exe
            dist/*.7z
          if-no-files-found: error
          retention-days: 7

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*-setup.exe
            dist/*.7z
          fail_on_unmatched_files: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Dev Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          files: |
            dist/*-setup.exe
            dist/*.7z
          fail_on_unmatched_files: false
          prerelease: true
          draft: false
          token: ${{ secrets.GITHUB_TOKEN }}

  linux:
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x64
          - arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
        run: npm install

      - name: Prepare (Download Mihomo Core)
        run: node scripts/prepare.mjs --${{ matrix.arch }}

      - name: Build Next.js
        run: npm run build

      - name: Build Electron
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
        run: npx electron-builder --linux --${{ matrix.arch }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Linux-${{ matrix.arch }}
          path: |
            dist/*.deb
            dist/*.rpm
          if-no-files-found: error
          retention-days: 7

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
          fail_on_unmatched_files: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Dev Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          files: |
            dist/*.deb
            dist/*.rpm
          fail_on_unmatched_files: false
          prerelease: true
          draft: false
          token: ${{ secrets.GITHUB_TOKEN }}

  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
        run: npm install

      - name: Prepare (Download Mihomo Core)
        run: node scripts/prepare.mjs --${{ matrix.arch }}

      - name: Build Next.js
        run: npm run build

      - name: Build Electron
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
        run: npm run electron:build:ci

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MacOS-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
          retention-days: 7

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
          fail_on_unmatched_files: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Dev Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          files: |
            dist/*.dmg
            dist/*.zip
          fail_on_unmatched_files: false
          prerelease: true
          draft: false
          token: ${{ secrets.GITHUB_TOKEN }}
